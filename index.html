<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Timer’s Aide</title>

<style>
@font-face {
  font-family: 'Orbitron';
  src: url('fonts/Orbitron-Bold.woff2');
}
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Bold.woff2');
}

body {
  margin: 0;
  background: black;
  font-family: 'Roboto';
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
  -webkit-touch-callout: none;
}

/* CONTAINER */
.container {
  width: 95vw;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
}

/* ROWS */
.row {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* HEIGHT SYSTEM */
.header { height: 8vh; background: black; color: white; }
.game-title { height: 6vh; background: #0b4dbf; color: white; }
.quarters { height: 8vh; background: #0b4dbf; }
.game-timer { height: 18vh; background: #0b4dbf; }
.game-controls { height: 10vh; background: #0b4dbf; }

.intermission-title { height: 6vh; background: white; }
.intermission-timer { height: 14vh; background: white; }
.intermission-controls { height: 10vh; background: white; }

.sirens-title { height: 6vh; background: red; color: white; }
.sirens-controls { height: 8vh; background: red; }

.footer { height: 6vh; background: black; color: grey; }

h1, h2 {
  font-family: 'Orbitron';
  margin: 0;
}

h1 { font-size: 4vh; }
h2 { font-size: 3vh; }

.timer {
  font-family: 'Orbitron';
  color: #00ff00;
  font-size: 10vh;
}

.small-timer {
  font-size: 6vh;
}

#intermissionTimer {
  color: #00ff00;
}

.timer.warning {
  color: red !important;
}

/* BUTTONS */
.button-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1vh;
  width: 100%;
}

button, select {
  flex: 1;
  max-width: 12vh;
  border: none;
  border-radius: 1vh;
  min-height: 4vh;
  font-size: 3vh;
  text-align: center;
  background: #b1b1b1;
}

button {
  display: flex;
  align-items: center;
  justify-content: center;
}

button svg {
  width: 40%;
  height: 40%;
  fill: currentColor;
}

/* COLOURS */
.play-btn { background: #C2FFA3 !important; }
.intermission-play-btn { background: #C2FFA3 !important; }
.pause-btn { background: #FFE599 !important; }
.reset-btn { background: #FF9999 !important; }

/* PRESS EFFECT */
button {
  transition: transform 0.08s ease, filter 0.08s ease;
}
button:active {
  transform: scale(0.92);
  filter: brightness(0.8);
}

a {
  color: rgb(66, 160, 186);
  font-size: 2vh;
}
</style>
</head>

<body>

<div class="container">

<div class="row header"><h1>Footy Timer</h1></div>

<div class="row game-title"><h2>Game Time</h2></div>

<div class="row quarters">
  <div class="button-row">
    <button onclick="selectQuarter(this)">Q1</button>
    <button onclick="selectQuarter(this)">Q2</button>
    <button onclick="selectQuarter(this)">Q3</button>
    <button onclick="selectQuarter(this)">Q4</button>
  </div>
</div>

<div class="row game-timer">
  <div id="gameTimer" class="timer">00:00</div>
</div>

<div class="row game-controls">
  <div class="button-row">
    <button onclick="toggleDirection()" id="directionBtn">⬆️</button>
    <select id="minutesSelect"></select>

    <button class="reset-btn" onclick="resetGame()">set</button>
    <button class="play-btn" onclick="startGame()">run</button>
    <button class="pause-btn" onclick="pauseGame()">pause</button>
  </div>
</div>

<div class="row intermission-title"><h2>Intermissions</h2></div>

<div class="row intermission-timer">
  <div id="intermissionTimer" class="timer small-timer">00:00</div>
</div>

<div class="row intermission-controls">
  <div class="button-row">
    <select id="intermissionSelect"></select>
    <button class="reset-btn" onclick="resetIntermission()">set</button>
    <button class="intermission-play-btn" onclick="startIntermission()">run</button>
  </div>
</div>

<div class="row sirens-title"><h2>Sirens</h2></div>

<div class="row sirens-controls">
  <div class="button-row">
    <button onclick="playSiren('siren.mp3')">Full</button>
    <button onclick="playSiren('twomin.mp3')">2-min</button>
    <button onclick="playSiren('onemin.mp3')">1-min</button>
  </div>
</div>

<div class="row footer">
  <div>
    <a href="instructions.html">instructions</a> | acamapps v1.0
  </div>
</div>

</div>

<script>

/* DROPDOWNS */
for (let i=0;i<=30;i++){
  let o=document.createElement("option");
  o.value=i;o.textContent=i;
  minutesSelect.appendChild(o);
}
for (let i=0;i<=20;i++){
  let o=document.createElement("option");
  o.value=i;o.textContent=i;
  intermissionSelect.appendChild(o);
}

/* AUDIO */
function playSiren(file){
  new Audio("sirens/"+file).play();
}

/* =========================
   GAME TIMER (PERSISTENT)
========================= */

let gameStartTime = null;
let gamePausedAt = null;
let gamePausedTotal = 0;
let gameRunning = false;
let countUp = true;

function getGameSeconds(){
  if (!gameStartTime) return 0;

  let now = gameRunning ? Date.now() : (gamePausedAt || Date.now());
  let elapsed = now - gameStartTime - gamePausedTotal;
  return Math.floor(elapsed / 1000);
}

function updateGame(){
  let gameSeconds = getGameSeconds();

  let m = Math.floor(gameSeconds / 60);
  let s = gameSeconds % 60;

  gameTimer.textContent =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

  if(!countUp && gameSeconds <= 60){
    gameTimer.classList.add("warning");
  } else {
    gameTimer.classList.remove("warning");
  }
}

function startGame(){
  if (gameRunning) return;

  const now = Date.now();

  if (!gameStartTime) {
    gameStartTime = now;
  } else if (gamePausedAt) {
    gamePausedTotal += now - gamePausedAt;
    gamePausedAt = null;
  }

  gameRunning = true;

  playSiren("siren.mp3");

  requestAnimationFrame(loopGame);
}

function loopGame(){
  if (!gameRunning) return;
  updateGame();
  requestAnimationFrame(loopGame);
}

function pauseGame(){
  if (!gameRunning) return;

  gamePausedAt = Date.now();
  gameRunning = false;
}

function resetGame(){
  gameStartTime = null;
  gamePausedAt = null;
  gamePausedTotal = 0;
  gameRunning = false;

  gameTimer.textContent = "00:00";
}

/* =========================
   INTERMISSION (PERSISTENT)
========================= */

let interStartTime = null;
let interPausedAt = null;
let interPausedTotal = 0;
let interRunning = false;

function getInterSeconds(){
  if (!interStartTime) return 0;

  let now = interRunning ? Date.now() : (interPausedAt || Date.now());
  let elapsed = now - interStartTime - interPausedTotal;
  return Math.floor(elapsed / 1000);
}

function updateIntermission(){
  let interSeconds = getInterSeconds();

  let m = Math.floor(interSeconds / 60);
  let s = interSeconds % 60;

  intermissionTimer.textContent =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

  if(interSeconds <= 60){
    intermissionTimer.classList.add("warning");
  } else {
    intermissionTimer.classList.remove("warning");
  }
}

function startIntermission(){
  if (interRunning) return;

  const now = Date.now();

  if (!interStartTime) {
    interStartTime = now;
  } else if (interPausedAt) {
    interPausedTotal += now - interPausedAt;
    interPausedAt = null;
  }

  interRunning = true;

  requestAnimationFrame(loopIntermission);
}

function loopIntermission(){
  if (!interRunning) return;
  updateIntermission();
  requestAnimationFrame(loopIntermission);
}

function resetIntermission(){
  interStartTime = null;
  interPausedAt = null;
  interPausedTotal = 0;
  interRunning = false;

  intermissionTimer.classList.remove("warning");
  intermissionTimer.textContent = "00:00";
}

/* QUARTERS */
function selectQuarter(btn){
  if (btn.classList.contains("active")) {
    btn.classList.remove("active");
    return;
  }

  document.querySelectorAll(".quarters button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}

directionBtn.textContent = "⬆️";

</script>

</body>
</html>
