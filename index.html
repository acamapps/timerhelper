<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Timer’s Aide</title>

<style>
@font-face {
  font-family: 'Orbitron';
  src: url('fonts/Orbitron-Bold.woff2');
}
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Bold.woff2');
}

body {
  margin: 0;
  background: black;
  font-family: 'Roboto';
  user-select: none;
}

/* CONTAINER */
.container {
  width: 95vw;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
}

/* ROWS */
.row {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* HEIGHT SYSTEM */
.header { height: 8vh; background: black; color: white; }
.game-title { height: 6vh; background: #0b4dbf; color: white; }
.quarters { height: 8vh; background: #0b4dbf; }
.game-timer { height: 18vh; background: #0b4dbf; }
.game-controls { height: 10vh; background: #0b4dbf; }

.intermission-title { height: 6vh; background: white; }
.intermission-timer { height: 14vh; background: white; }
.intermission-controls { height: 10vh; background: white; }

.sirens-title { height: 6vh; background: red; color: white; }
.sirens-controls { height: 8vh; background: red; }

.footer { height: 6vh; background: black; color: grey; }

/* TEXT */
h1, h2 {
  font-family: 'Orbitron';
  margin: 0;
}

h1 { font-size: 4vh; }
h2 { font-size: 3vh; }

/* TIMERS */
.timer {
  font-family: 'Orbitron';
  color: #00ff00;
  font-size: 10vh;
}

.small-timer {
  font-size: 6vh;
}

#intermissionTimer {
  color: #00ff00;
}

.timer.warning {
  color: red !important;
  /* text-shadow: 0 0 10px rgba(255,0,0,0.8); */
}

/* BUTTON ROWS */
.button-row {
  display: flex;
  justify-content: center;   /* centres buttons */
  align-items: center;
  gap: 1vh;
  width: 100%;
}

/* BUTTONS */
button, select {
  flex: 1;
  max-width: 12vh;
  border: none;
  border-radius: 1vh;
  min-height: 4vh;
  font-size: 3vh;
  text-align: center;
  background: #b1b1b1;
}

button {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ACTIVE QUARTER */
button.active {
  border: 0.4vh solid #00ff00;
  color: #00ff00;
}

/* SVG */
button svg {
  width: 40%;
  height: 40%;
  fill: currentColor;
}

.play-btn {
  background: #C2FFA3 !important; /* light green */
}

.intermission-play-btn {
  background: #C2FFA3 !important;
}

.pause-btn {
  background: #FFE599 !important; /* orange */
}

.reset-btn {
  background: #FF9999 !important; /* red */
}

.intermission-reset-btn {
  background: #FF9999 !important;
}

/* LINKS */
a {
  color: rgb(66, 160, 186);
  font-size: 2vh;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="row header">
  <h1>Footy Timer</h1>
</div>

<!-- GAME -->
<div class="row game-title"><h2>Game Time</h2></div>

<div class="row quarters">
  <div class="button-row">
    <button onclick="selectQuarter(this)">Q1</button>
    <button onclick="selectQuarter(this)">Q2</button>
    <button onclick="selectQuarter(this)">Q3</button>
    <button onclick="selectQuarter(this)">Q4</button>
  </div>
</div>

<div class="row game-timer">
  <div id="gameTimer" class="timer">00:00</div>
</div>

<div class="row game-controls">
  <div class="button-row">
    <button onclick="toggleDirection()" id="directionBtn">⬆️</button>
    <select id="minutesSelect"></select>

<button class="reset-btn" onclick="resetGame()">
  set
</button>

    <button class="play-btn" onclick="startGame()">
      run
    </button>

    <button class="pause-btn" onclick="pauseGame()">
      pause
    </button>
  </div>
</div>

<!-- INTERMISSION -->
<div class="row intermission-title"><h2>Intermissions</h2></div>

<div class="row intermission-timer">
  <div id="intermissionTimer" class="timer small-timer">00:00</div>
</div>

<div class="row intermission-controls">
  <div class="button-row">
    <select id="intermissionSelect"></select>

    <button class="reset-btn" onclick="resetIntermission()">
      set
    </button>

    <button class="intermission-play-btn" onclick="startIntermission()">
      run
    </button>
  </div>
</div>

<!-- SIRENS -->
<div class="row sirens-title"><h2>Sirens</h2></div>

<div class="row sirens-controls">
  <div class="button-row">
    <button onclick="playSiren('siren.mp3')">Full</button>
    <button onclick="playSiren('twomin.mp3')">2-min</button>
    <button onclick="playSiren('onemin.mp3')">1-min</button>
  </div>
</div>

<!-- FOOTER -->
<div class="row footer">
  <div>
    <a href="instructions.html">instructions</a> | acamapps v1.0
  </div>
</div>

</div>

<script>

/* DROPDOWNS */
for (let i=0;i<=30;i++){
  let o=document.createElement("option");
  o.value=i;o.textContent=i;
  minutesSelect.appendChild(o);
}
for (let i=0;i<=20;i++){
  let o=document.createElement("option");
  o.value=i;o.textContent=i;
  intermissionSelect.appendChild(o);
}

/* AUDIO */
function playSiren(file){
  new Audio("sirens/"+file).play();
}

/* GAME TIMER */
let gameSeconds=0, gameInterval=null, countUp=true;

function updateGame(){
  let m = Math.floor(gameSeconds / 60);
  let s = gameSeconds % 60;

  gameTimer.textContent =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

  // 🔴 WARNING STATE (ONLY WHEN COUNTING DOWN)
  if(!countUp && gameSeconds <= 60){
    gameTimer.classList.add("warning");
  } else {
    gameTimer.classList.remove("warning");
  }
}

function startGame(){
  if(gameInterval) return;

  playSiren("siren.mp3");

  gameInterval=setInterval(()=>{
    gameSeconds+=countUp?1:-1;

    if(!countUp && gameSeconds<=0){
      gameSeconds=0;
      updateGame();
      clearInterval(gameInterval);
      gameInterval=null;

      playSiren("siren.mp3");

      resetIntermission();
      startIntermission();
      return;
    }

    updateGame();
  },1000);
}

function pauseGame(){
  clearInterval(gameInterval);
  gameInterval=null;
}

function resetGame(){
  clearInterval(gameInterval);
  gameInterval=null;
  gameSeconds=parseInt(minutesSelect.value || 0)*60;
  updateGame();
}

function toggleDirection(){
  countUp=!countUp;
  directionBtn.textContent=countUp?"⬆️":"⬇️";
}

/* INTERMISSION */
let intermissionSeconds=0, intermissionInterval=null;
let played2=false, played1=false;

function updateIntermission(){
  let m = Math.floor(intermissionSeconds / 60);
  let s = intermissionSeconds % 60;

  intermissionTimer.textContent =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

  if(intermissionSeconds <= 60){
    intermissionTimer.classList.add("warning");
  } else {
    intermissionTimer.classList.remove("warning");
  }
}

function startIntermission(){
  if(intermissionInterval) return;

  intermissionInterval=setInterval(()=>{
    intermissionSeconds--;

    if(intermissionSeconds===120 && !played2){
      playSiren("twomin.mp3");
      played2=true;
    }

    if(intermissionSeconds===60 && !played1){
      playSiren("onemin.mp3");
      played1=true;
    }

    if(intermissionSeconds<=0){
      intermissionSeconds=0;
      clearInterval(intermissionInterval);
      intermissionInterval=null;
    }

    updateIntermission();
  },1000);
}

function resetIntermission(){
  clearInterval(intermissionInterval);
  intermissionInterval = null;

  intermissionSeconds = parseInt(intermissionSelect.value || 0) * 60;

  played2 = false;
  played1 = false;

  // 🔴 IMPORTANT: force remove red state on reset
  intermissionTimer.classList.remove("warning");

  updateIntermission();
}

/* QUARTERS */
function selectQuarter(btn){
  document.querySelectorAll(".quarters button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* INIT */
directionBtn.textContent = "⬆️";
updateGame();
updateIntermission();

</script>

</body>
</html>
