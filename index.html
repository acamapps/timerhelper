<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer’s Aide</title>

<style>
@font-face {
  font-family: 'Orbitron';
  src: url('fonts/Orbitron-Bold.woff2');
}
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Bold.woff2');
}

body {
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  font-family: 'Roboto';
}

/* SECTIONS */
.section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-evenly;
  text-align: center;
}

/* HEIGHTS */
.header { height: 10vh; background: black; color: white; }
.game { height: 35vh; background: #0b4dbf; color: white; }
.intermission { height: 25vh; background: white; color: black; }
.sirens { height: 10vh; background: red; color: white; }
.footer { height: 10vh; background: black; color: white; }

/* HEADINGS */
h1, h2 {
  font-family: 'Orbitron';
  margin: 0;
}

/* TIMERS (NO BACKGROUND NOW) */
.timer {
  font-family: 'Orbitron';
  color: #00ff00;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* GAME TIMER = 25% of GAME SECTION */
#gameTimer {
  font-size: 6em;
  flex: 0 0 25%;
}

/* INTERMISSION TIMER = 15% of SECTION */
#intermissionTimer {
  font-size: 3.75em;
  flex: 0 0 15%;
}

/* ROWS */
.row {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  width: 100%;
}

/* BUTTONS + DROPDOWNS */
button, select {
  font-family: 'Roboto';
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #666;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 55px;
}

button svg {
  width: 18px;
  height: 18px;
  fill: white;
}

button.active {
  border: 2px solid #00ff00;
  color: #00ff00;
}

/* INTERMISSION BUTTON SCALE */
.intermission .row {
  width: 60%;
}

/* FOOTER LINKS */
a {
  color: white;
}
</style>
</head>

<body>

<div class="section header">
  <h1>Footy Timer</h1>
</div>

<!-- GAME -->
<div class="section game">

  <h2>Game Time</h2>

  <div class="row">
    <button onclick="selectQuarter(this)">Q1</button>
    <button onclick="selectQuarter(this)">Q2</button>
    <button onclick="selectQuarter(this)">Q3</button>
    <button onclick="selectQuarter(this)">Q4</button>
  </div>

  <div id="gameTimer" class="timer">00:00</div>

  <div class="row">
    <button onclick="toggleDirection()" id="directionBtn">Up</button>

    <select id="minutesSelect"></select>

    <button onclick="resetGame()">
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
    </button>

    <button onclick="startGame()">
      <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
    </button>

    <button onclick="pauseGame()">
      <svg viewBox="0 0 24 24">
        <rect x="6" y="5" width="4" height="14"/>
        <rect x="14" y="5" width="4" height="14"/>
      </svg>
    </button>
  </div>

</div>

<!-- INTERMISSION -->
<div class="section intermission">

  <h2>Intermissions</h2>

  <div id="intermissionTimer" class="timer">00:00</div>

  <div class="row">
    <select id="intermissionSelect"></select>

    <button onclick="resetIntermission()">
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
    </button>

    <button onclick="startIntermission()">
      <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
    </button>
  </div>

</div>

<!-- SIRENS -->
<div class="section sirens">

  <h2>Sirens</h2>

  <div class="row">
    <button onclick="playSiren('siren.mp3')">Full</button>
    <button onclick="playSiren('twomin.mp3')">2-min</button>
    <button onclick="playSiren('onemin.mp3')">1-min</button>
  </div>

</div>

<div class="section footer">
  <div>acamapps v1.0</div>
</div>

<script>

/* DROPDOWNS */
for (let i=0;i<=30;i++){
  let o=document.createElement("option");
  o.value=i;o.textContent=i;
  minutesSelect.appendChild(o);
}
for (let i=0;i<=20;i++){
  let o=document.createElement("option");
  o.value=i;o.textContent=i;
  intermissionSelect.appendChild(o);
}

/* AUDIO */
function playSiren(file){
  new Audio("sirens/"+file).play();
}

/* GAME TIMER */
let gameSeconds=0, gameInterval=null, countUp=true;

function updateGame(){
  let m=Math.floor(gameSeconds/60);
  let s=gameSeconds%60;
  gameTimer.textContent =
    String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

function startGame(){
  if(gameInterval) return;

  playSiren("siren.mp3");

  gameInterval=setInterval(()=>{
    gameSeconds+=countUp?1:-1;

    if(!countUp && gameSeconds<=0){
      gameSeconds=0;
      updateGame();
      clearInterval(gameInterval);
      gameInterval=null;

      playSiren("siren.mp3");

      resetIntermission();
      startIntermission();
      return;
    }

    updateGame();
  },1000);
}

function pauseGame(){
  clearInterval(gameInterval);
  gameInterval=null;
}

function resetGame(){
  clearInterval(gameInterval);
  gameInterval=null;
  gameSeconds=minutesSelect.value*60;
  updateGame();
}

function toggleDirection(){
  countUp=!countUp;
  directionBtn.textContent=countUp?"Up":"Down";
}

/* INTERMISSION */
let intermissionSeconds=0, intermissionInterval=null;
let played2=false, played1=false;

function updateIntermission(){
  let m=Math.floor(intermissionSeconds/60);
  let s=intermissionSeconds%60;
  intermissionTimer.textContent =
    String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

function startIntermission(){
  if(intermissionInterval) return;

  intermissionInterval=setInterval(()=>{
    intermissionSeconds--;

    if(intermissionSeconds===120 && !played2){
      playSiren("twomin.mp3");
      played2=true;
    }

    if(intermissionSeconds===60 && !played1){
      playSiren("onemin.mp3");
      played1=true;
    }

    if(intermissionSeconds<=0){
      intermissionSeconds=0;
      clearInterval(intermissionInterval);
      intermissionInterval=null;
    }

    updateIntermission();
  },1000);
}

function resetIntermission(){
  clearInterval(intermissionInterval);
  intermissionInterval=null;

  intermissionSeconds=intermissionSelect.value*60;

  played2=false;
  played1=false;

  updateIntermission();
}

/* QUARTERS */
function selectQuarter(btn){
  document.querySelectorAll(".game button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

</script>

</body>
</html>
